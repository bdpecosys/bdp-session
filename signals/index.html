<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BDP Signal Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--navy:#0f1f38;--blue:#0070c0;--blue-dim:rgba(0,112,192,.08);--gold:#c9a84c;--green:#059669;--green-dim:rgba(5,150,105,.08);--amber:#d97706;--amber-dim:rgba(217,119,6,.08);--cream:#faf8f4;--white:#fff;--text:#1a1a2e;--muted:#6b7280;--border:rgba(0,0,0,.07);--surface:#f4f2ee}
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100vh;font-family:"DM Sans",sans-serif;background:var(--cream);color:var(--text);font-size:13px}
.accent-bar{height:3px;background:linear-gradient(90deg,var(--navy),var(--blue) 55%,var(--gold))}
.header{padding:14px 32px;background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.header-brand{display:flex;align-items:center;gap:12px}
.header-logo{height:32px;width:auto}
.header-title{font-family:"Cormorant Garamond",serif;font-size:20px;font-weight:400;color:var(--navy)}
.header-title span{font-style:italic;color:var(--blue)}
.status-bar{padding:7px 32px;background:var(--navy);display:flex;align-items:center;gap:20px;flex-wrap:wrap}
.status-item{font-size:11px;color:rgba(255,255,255,.6);display:flex;align-items:center;gap:6px}
.dot{width:6px;height:6px;border-radius:50%;background:var(--gold);animation:pulse 2s infinite}
.dot.done{background:var(--green);animation:none}
.dot.loading{background:var(--amber)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.controls{padding:12px 32px;background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.fbtn{padding:5px 13px;border-radius:20px;border:1px solid var(--border);background:var(--white);color:var(--muted);font-size:12px;font-family:"DM Sans",sans-serif;cursor:pointer;transition:all .15s}
.fbtn:hover{border-color:var(--blue);color:var(--blue)}
.fbtn.active{background:var(--navy);color:var(--white);border-color:var(--navy)}
.fbtn.cloud.active{background:var(--blue);border-color:var(--blue)}
.fbtn.hiring.active{background:var(--green);border-color:var(--green)}
.fbtn.platform.active{background:var(--amber);border-color:var(--amber)}
.search{padding:5px 13px;border:1px solid var(--border);border-radius:20px;font-family:"DM Sans",sans-serif;font-size:12px;color:var(--text);background:var(--white);outline:none;width:180px}
.search:focus{border-color:var(--blue)}
.ml{margin-left:auto}
.refresh-btn{padding:5px 14px;border-radius:20px;background:var(--navy);color:var(--white);border:none;font-family:"DM Sans",sans-serif;font-size:12px;font-weight:500;cursor:pointer}
.refresh-btn:hover{background:var(--blue)}
.refresh-btn:disabled{opacity:.5;cursor:default}
.stats{padding:10px 32px;display:flex;gap:24px;flex-wrap:wrap;border-bottom:1px solid var(--border);background:var(--surface)}
.stat{text-align:center}
.stat-n{font-family:"Cormorant Garamond",serif;font-size:26px;color:var(--navy);line-height:1}
.stat-l{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-top:2px}
.main{padding:20px 32px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:12px}
.card{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:15px 17px;display:flex;flex-direction:column;gap:9px;transition:box-shadow .2s;animation:fadeIn .3s ease both}
.card:hover{box-shadow:0 4px 20px rgba(0,0,0,.07)}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.badges{display:flex;gap:5px;flex-wrap:wrap}
.badge{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;padding:2px 7px;border-radius:4px}
.b-cloud{background:var(--blue-dim);color:var(--blue)}
.b-hiring{background:var(--green-dim);color:var(--green)}
.b-platform{background:var(--amber-dim);color:var(--amber)}
.b-geo{background:rgba(0,0,0,.05);color:var(--muted)}
.card-date{font-size:11px;color:var(--muted);white-space:nowrap;flex-shrink:0}
.card-title{font-size:13px;font-weight:500;color:var(--text);line-height:1.4}
.card-title a{color:inherit;text-decoration:none}
.card-title a:hover{color:var(--blue)}
.card-source{font-size:11px;color:var(--muted)}
.card-actions{display:flex;align-items:center;gap:7px;margin-top:2px}
.btn-action{padding:5px 12px;border-radius:6px;border:none;background:var(--navy);color:var(--white);font-family:"DM Sans",sans-serif;font-size:11px;font-weight:500;cursor:pointer;white-space:nowrap}
.btn-action:hover{background:var(--blue)}
.btn-read{padding:5px 12px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:"DM Sans",sans-serif;font-size:11px;cursor:pointer;text-decoration:none;display:inline-block}
.btn-read:hover{border-color:var(--blue);color:var(--blue)}
.skeleton{background:linear-gradient(90deg,#f0ece4 25%,#e8e4dc 50%,#f0ece4 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:10px;height:130px;border:1px solid var(--border)}
@keyframes shimmer{0%{background-position:200%}100%{background-position:-200%}}
.empty{text-align:center;padding:60px 24px;color:var(--muted);font-size:15px}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:center;justify-content:center;padding:24px}
.modal-bg.open{display:flex}
.modal{background:var(--white);border-radius:12px;padding:26px 30px;max-width:540px;width:100%;position:relative;animation:fadeIn .2s ease both}
.modal-x{position:absolute;top:14px;right:16px;background:none;border:none;font-size:20px;cursor:pointer;color:var(--muted)}
.modal-x:hover{color:var(--text)}
.modal-h{font-family:"Cormorant Garamond",serif;font-size:22px;color:var(--navy);margin-bottom:4px}
.modal-sub{font-size:12px;color:var(--muted);margin-bottom:18px;line-height:1.5}
.field{margin-bottom:12px}
.field-label{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);font-weight:500;margin-bottom:5px}
.field-input{width:100%;padding:8px 11px;border:1px solid var(--border);border-radius:6px;font-family:"DM Sans",sans-serif;font-size:13px;color:var(--text);background:var(--cream);outline:none}
.field-input:focus{border-color:var(--blue);background:var(--white)}
.link-box{padding:9px 13px;background:var(--surface);border:1px solid var(--border);border-radius:6px;font-size:12px;color:var(--blue);word-break:break-all;line-height:1.5;margin:14px 0;cursor:pointer}
.modal-actions{display:flex;gap:9px}
.btn-copy{flex:1;padding:9px;border-radius:6px;border:none;background:var(--navy);color:var(--white);font-family:"DM Sans",sans-serif;font-size:13px;font-weight:500;cursor:pointer}
.btn-copy:hover{background:var(--blue)}
.btn-copy.copied{background:var(--green)}
.btn-cancel{padding:9px 18px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:"DM Sans",sans-serif;font-size:13px;cursor:pointer}
.footer{padding:14px 32px;border-top:1px solid var(--border);background:var(--white);display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-top:32px;flex-wrap:wrap;gap:8px}
@media(max-width:600px){.header,.controls,.stats,.main,.status-bar{padding-left:16px;padding-right:16px}.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="accent-bar"></div>
<header class="header">
  <div class="header-brand">
    <img class="header-logo" src="https://bdpartners.co/logo.png" onerror="this.style.display='none'" alt="BDP">
    <div class="header-title">Signal <span>Intelligence</span></div>
  </div>
  <div id="last-updated" style="font-size:11px;color:var(--muted)">—</div>
</header>
<div class="status-bar">
  <div class="status-item"><div class="dot" id="dot"></div><span id="status">Initializing...</span></div>
  <div class="status-item" id="progress"></div>
</div>
<div class="controls">
  <button class="fbtn active" data-type="all" onclick="filterType('all',this)">All signals</button>
  <button class="fbtn cloud" data-type="cloud" onclick="filterType('cloud',this)">Cloud migration</button>
  <button class="fbtn hiring" data-type="hiring" onclick="filterType('hiring',this)">Senior hires</button>
  <button class="fbtn platform" data-type="platform" onclick="filterType('platform',this)">Partnerships</button>
  <span style="color:var(--border);margin:0 2px">|</span>
  <button class="fbtn" data-geo="IL" onclick="filterGeo('IL',this)">Israel</button>
  <button class="fbtn" data-geo="UAE" onclick="filterGeo('UAE',this)">UAE</button>
  <button class="fbtn" data-geo="APAC" onclick="filterGeo('APAC',this)">APAC</button>
  <button class="fbtn" data-geo="EU" onclick="filterGeo('EU',this)">EU</button>
  <input class="search ml" type="text" placeholder="Search..." oninput="render()" id="q">
  <button class="refresh-btn" id="rbtn" onclick="load(true)">Refresh</button>
</div>
<div class="stats">
  <div class="stat"><div class="stat-n" id="s-total">-</div><div class="stat-l">Total</div></div>
  <div class="stat"><div class="stat-n" id="s-cloud" style="color:var(--blue)">-</div><div class="stat-l">Cloud</div></div>
  <div class="stat"><div class="stat-n" id="s-hiring" style="color:var(--green)">-</div><div class="stat-l">Hires</div></div>
  <div class="stat"><div class="stat-n" id="s-platform" style="color:var(--amber)">-</div><div class="stat-l">Partnerships</div></div>
  <div class="stat"><div class="stat-n" id="s-showing">-</div><div class="stat-l">Showing</div></div>
</div>
<main class="main">
  <div id="loading" class="grid"><div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div></div>
  <div id="results" style="display:none"><div class="grid" id="grid"></div></div>
  <div id="empty" class="empty" style="display:none">No signals match your filters.</div>
</main>
<div class="modal-bg" id="modal" onclick="bgClick(event)">
  <div class="modal">
    <button class="modal-x" onclick="closeModal()">x</button>
    <div class="modal-h">Generate opt-in link</div>
    <div class="modal-sub" id="msig"></div>
    <div class="field"><div class="field-label">Startup name</div><input class="field-input" id="m-startup" placeholder="e.g. Metriko" oninput="mkLink()"></div>
    <div class="field"><div class="field-label">Enterprise company</div><input class="field-input" id="m-company" placeholder="e.g. Singlife" oninput="mkLink()"></div>
    <div class="field"><div class="field-label">Contact title</div><input class="field-input" id="m-contact" placeholder="e.g. CIO" oninput="mkLink()"></div>
    <div class="field"><div class="field-label">Opportunity ID</div><input class="field-input" id="m-opp" placeholder="e.g. OPP-001" oninput="mkLink()"></div>
    <div class="field-label" style="margin-bottom:5px">Generated link</div>
    <div class="link-box" id="m-link" onclick="copyLink()">-</div>
    <div class="modal-actions">
      <button class="btn-copy" id="copybtn" onclick="copyLink()">Copy link</button>
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
    </div>
  </div>
</div>
<footer class="footer">
  <span>BDP Ecosystems &middot; Signal Intelligence</span>
  <span id="fcount">-</span>
</footer>
<script src="app.js"></script>
</body>
</html>
